get:
  tags:
    - admin
  summary: Get federation settings pertaining to relays
  responses:
    "200":
      description: ""
      content:
        application/json:
          schema:
            allOf:
              - type: object
                properties:
                  title:
                    type: string
                  relays:
                    $ref: ../../../components/schemas/admin/relays.yaml#/RelaysArray
                  data:
                    type: object
                    properties:
                      in:
                        type: array
                        items:
                          type: number
                      out:
                        type: array
                        items:
                          type: number
              - $ref: ../../../components/schemas/CommonProps.yaml#/CommonProps