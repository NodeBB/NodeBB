put:
  tags:
    - users
  summary: mute a user
  parameters:
    - in: path
      name: uid
      schema:
        type: integer
      required: true
      description: uid of the user to mute
      example: 2
    - name: until
      in: query
      schema:
        type: string
        format: date-time
        nullable: true
      description: Mute expiration timestamp (ISO 8601)
    - name: reason
      in: query
      schema:
        type: string
        nullable: true
      description: Reason for the mute
  requestBody:
    content:
      application/json:
        schema:
          type: object
          properties:
            until:
              type: string
              format: date-time
              nullable: true
              description: Mute expiration timestamp (ISO 8601)
            reason:
              type: string
              nullable: true
              description: Reason for the mute
  responses:
    '200':
      description: successfully muted user
      content:
        application/json:
          schema:
            type: object
            properties:
              status:
                $ref: ../../../components/schemas/Status.yaml#/Status
              response:
                type: object
delete:
  tags:
    - users
  summary: unmute a user
  parameters:
    - in: path
      name: uid
      schema:
        type: integer
      required: true
      description: uid of the user to unmute
      example: 2
    - name: reason
      in: query
      schema:
        type: string
        nullable: true
      description: Reason for the unmute
  requestBody:
    content:
      application/json:
        schema:
          type: object
          properties:
            reason:
              type: string
              nullable: true
              description: Reason for the unmute
  responses:
    '200':
      description: successfully unmuted user
      content:
        application/json:
          schema:
            type: object
            properties:
              status:
                $ref: ../../../components/schemas/Status.yaml#/Status
              response:
                type: object
