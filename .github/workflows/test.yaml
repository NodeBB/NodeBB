name: Lint and test

on:
  push:
    branches:
      - master
      - develop
  pull_request:
    branches:
      - master
      - develop

defaults:
  run:
    shell: bash

permissions:
  contents: read

jobs:
  test:
    permissions:
      checks: write  # for coverallsapp/github-action to create new checks
      contents: read  # for actions/checkout to fetch code
    name: Lint and test
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        node: [22, 24]
        database: [mongo-dev, mongo, redis, postgres, sqlite, mysql]
        include:
          # only run coverage once
          - os: ubuntu-latest
            node: 24
            coverage: true
          # test under development once
          - database: mongo-dev
            test_env: development
          # only run eslint once
          - os: ubuntu-latest
            node: 24
            database: mongo-dev
            lint: true
    runs-on: ${{ matrix.os }}
    env:
      TEST_ENV: ${{ matrix.test_env || 'production' }}
      # Bail by default; opt out for the kysely-backed matrix entries so the
      # full failure surface is visible while we drive parity. Native
      # backends keep upstream's bail-on-first-failure behaviour.
      BAIL: ${{ (matrix.database == 'sqlite' || matrix.database == 'mysql') && 'false' || 'true' }}

    services:
      postgres:
        image: 'postgres:18-alpine'
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        # Set health checks to wait until postgres has started
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          # Maps port 5432 on service container to the host
          - 5432:5432

      redis:
        image: 'redis:8.6.2'
        # Set health checks to wait until redis has started
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          # Maps port 6379 on service container to the host
          - 6379:6379

      mongo:
        image: 'mongo:8.2'
        ports:
          # Maps port 27017 on service container to the host
          - 27017:27017

      mysql:
        # MySQL 5.6 — explicitly chosen as the oldest supported version, to
        # exercise dialect-portability paths (no row-alias UPSERT, no VALUES
        # table source, no window functions). Tuned for utf8mb4 + Barracuda
        # so VARCHAR(255) PKs fit under the 3072-byte index limit.
        image: 'mysql:5.6'
        env:
          MYSQL_ROOT_PASSWORD: rootpw
          MYSQL_DATABASE: nodebb
          MYSQL_USER: nodebb
          MYSQL_PASSWORD: nodebb
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
          --character-set-server=utf8mb4
          --collation-server=utf8mb4_unicode_ci
          --innodb_large_prefix=ON
          --innodb_file_format=Barracuda
        ports:
          - 3306:3306

    steps:
      - uses: actions/checkout@v6

      - run: cp install/package.json package.json

      - name: Install Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}

      - name: NPM Install
        uses: bahmutov/npm-install@v1
        with:
          useLockFile: false

      - name: Setup on MongoDB
        if: startsWith(matrix.database, 'mongo')
        env:
          SETUP: >-
            {
              "url": "http://127.0.0.1:4567",
              "secret": "abcdef",
              "admin:username": "admin",
              "admin:email": "test@example.org",
              "admin:password": "hAN3Eg8W",
              "admin:password:confirm": "hAN3Eg8W",

              "database": "mongo",
              "mongo:host": "127.0.0.1",
              "mongo:port": 27017,
              "mongo:username": "",
              "mongo:password": "",
              "mongo:database": "nodebb"
            }
          CI: >-
            {
              "host": "127.0.0.1",
              "port": 27017,
              "database": "ci_test"
            }
        run: |
          node app --setup="${SETUP}" --ci="${CI}"

      - name: Setup on PostgreSQL
        if: startsWith(matrix.database, 'postgres')
        env:
          SETUP: >-
            {
              "url": "http://127.0.0.1:4567",
              "secret": "abcdef",
              "admin:username": "admin",
              "admin:email": "test@example.org",
              "admin:password": "hAN3Eg8W",
              "admin:password:confirm": "hAN3Eg8W",

              "database": "postgres",
              "postgres:host": "127.0.0.1",
              "postgres:port": 5432,
              "postgres:username": "postgres",
              "postgres:password": "postgres",
              "postgres:database": "nodebb"
            }
          CI: >-
            {
              "host": "127.0.0.1",
              "database": "ci_test",
              "port": 5432,
              "username": "postgres",
              "password": "postgres"
            }
        run: |
          node -e "const { Client } = require('pg'); const c = new Client({ host: '127.0.0.1', port: 5432, user: 'postgres', password: 'postgres' }); c.connect().then(() => c.query('CREATE DATABASE nodebb')).then(() => c.query('CREATE DATABASE ci_test')).then(() => c.end())"
          node app --setup="${SETUP}" --ci="${CI}"

      - name: Setup on Redis
        if: startsWith(matrix.database, 'redis')
        env:
          SETUP: >-
            {
              "url": "http://127.0.0.1:4567/forum",
              "secret": "abcdef",
              "admin:username": "admin",
              "admin:email": "test@example.org",
              "admin:password": "hAN3Eg8W",
              "admin:password:confirm": "hAN3Eg8W",

              "database": "redis",
              "redis:host": "127.0.0.1",
              "redis:port": 6379,
              "redis:password": "",
              "redis:database": 0
            }
          CI: >-
            {
              "host": "127.0.0.1",
              "database": 1,
              "port": 6379
            }
        run: |
          node app --setup="${SETUP}" --ci="${CI}"

      - name: Setup on MySQL
        if: startsWith(matrix.database, 'mysql')
        env:
          SETUP: >-
            {
              "url": "http://127.0.0.1:4567",
              "secret": "abcdef",
              "admin:username": "admin",
              "admin:email": "test@example.org",
              "admin:password": "hAN3Eg8W",
              "admin:password:confirm": "hAN3Eg8W",

              "database": "kysely",
              "kysely:dialect": "mysql",
              "kysely:host": "127.0.0.1",
              "kysely:port": 3306,
              "kysely:username": "root",
              "kysely:password": "rootpw",
              "kysely:database": "nodebb"
            }
          CI: >-
            {
              "dialect": "mysql",
              "host": "127.0.0.1",
              "port": 3306,
              "username": "root",
              "password": "rootpw",
              "database": "ci_test"
            }
        run: |
          node -e "const m=require('mysql2/promise');(async()=>{const c=await m.createConnection({host:'127.0.0.1',port:3306,user:'root',password:'rootpw'});await c.query('CREATE DATABASE IF NOT EXISTS nodebb CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci');await c.query('CREATE DATABASE IF NOT EXISTS ci_test CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci');await c.end();})()"
          node app --setup="${SETUP}" --ci="${CI}"

      - name: Setup on SQLite
        if: startsWith(matrix.database, 'sqlite')
        env:
          SETUP: >-
            {
              "url": "http://127.0.0.1:4567",
              "secret": "abcdef",
              "admin:username": "admin",
              "admin:email": "test@example.org",
              "admin:password": "hAN3Eg8W",
              "admin:password:confirm": "hAN3Eg8W",

              "database": "kysely",
              "kysely:dialect": "sqlite",
              "kysely:database": "./nodebb.db"
            }
          CI: >-
            {
              "dialect": "sqlite",
              "database": "./ci_test.db"
            }
        run: |
          node app --setup="${SETUP}" --ci="${CI}"

      - name: Run ESLint
        if: matrix.lint
        run: npm run lint

      - name: Node tests
        run: npm test

      - name: Extract coverage info
        run: npm run coverage

      - name: Test coverage
        uses: coverallsapp/github-action@648a8eb78e6d50909eff900e4ec85cab4524a45b # v2.3.6
        if: matrix.coverage
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          flag-name: ${{ matrix.os }}-node-${{ matrix.node }}-db-${{ matrix.database }}
          parallel: true
          fail-on-error: false

  finish:
    permissions:
      checks: write  # for coverallsapp/github-action to create new checks
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Coveralls Finished
        uses: coverallsapp/github-action@648a8eb78e6d50909eff900e4ec85cab4524a45b # v2.3.6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          parallel-finished: true
          fail-on-error: false
